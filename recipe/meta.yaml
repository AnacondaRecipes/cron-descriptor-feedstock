{% set name = "cron-descriptor" %}
{% set version = "2.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ecddb8b2f6c5286398949aaefe185364666af74f33b01877c61378e1fd4e38e6

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<39]

requirements:
  host:
    - pip
    - setuptools
    - wheel
    - python
  run:
    - python
    - typing_extensions

test:
  imports:
    - cron_descriptor
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Salamek/cron-descriptor
  summary: A Python library that converts cron expressions into human readable strings.
  description: A Python library that converts cron expressions into human readable strings.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://github.com/Salamek/cron-descriptor
  dev_url: https://github.com/Salamek/cron-descriptor

extra:
  recipe-maintainers:
    - mariusvniekerk
